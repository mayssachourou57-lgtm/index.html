<!DOCTYPE html>

<title>Graphique des scores factoriels</title>
<style>
  :root {
    --bg: #f6f8fc;
    --card-bg: #ffffff;
    --border: #e3e8f2;
    --text: #1f2937;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #f8fbff 0%, #eef2ff 100%);
    color: var(--text);
    padding: 24px;
  }
  .wrap {
    max-width: 1150px;
    margin: 0 auto;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .controls label {
    font-size: 14px;
    color: var(--muted);
  }
  select {
    font-size: 14px;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    min-width: 170px;
    outline: none;
  }
  .card {
    background: rgba(255,255,255,0.96);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
  }
  .chart-container {
    position: relative;
    width: 100%;
    height: 82vh;
    min-height: 540px;
  }
  @media (max-width: 700px) {
    body { padding: 14px; }
    .topbar { flex-direction: column; align-items: flex-start; }
    .chart-container { height: 72vh; min-height: 460px; }
  }
</style>
</head>
<body>

  sel.appendChild(o);
});

const canvas = document.getElementById('factorChart');
const ctx = canvas.getContext('2d');
let chart;

function render(key) {
  const d = data[key];
  const combined = [...d.hi.slice().reverse(), ...d.lo.slice().reverse()];
  const labels = combined.map(x => x[0]);
  const values = combined.map(x => x[1]);
  const colors = values.map(v => v >= 0 ? '#2563eb' : '#ef4444');

  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderRadius: 6, barThickness: 16 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      devicePixelRatio: Math.max(window.devicePixelRatio || 1, 2),
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (c) => c.parsed.x.toFixed(3) } }
      },
      scales: {
        x: { grid: { color: '#e5e7eb' }, ticks: { color: '#6b7280', font: { size: 12 } } },
        y: { grid: { display: false }, ticks: { color: '#374151', font: { size: 12 } } }
      }
    }
  });
}

sel.addEventListener('change', (e) => render(e.target.value));
